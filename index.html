<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Барабаны сепараторов</title>
    <style>
        * { box-sizing: border-box; font-family: system-ui, 'Segoe UI', 'Roboto', sans-serif; }
        body { background: #e9f0f5; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { max-width: 1300px; width: 100%; background: white; border-radius: 28px; padding: 20px 24px 32px 24px; }
        h1 { font-size: 1.8rem; margin: 0 0 6px 0; color: #1e466e; }
        .sub { color: #2c5a8c; border-left: 4px solid #2c7da0; padding-left: 16px; margin: 12px 0 20px 0; }
        .status-bar { background: #e8f4f8; border-radius: 20px; padding: 10px 16px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; font-size: 0.8rem; }
        .status-ok { color: #155724; background: #d4edda; padding: 4px 12px; border-radius: 40px; }
        .status-warning { color: #856404; background: #fff3cd; padding: 4px 12px; border-radius: 40px; }
        .status-error { color: #721c24; background: #f8d7da; padding: 4px 12px; border-radius: 40px; }
        .stats { display: flex; gap: 16px; margin-bottom: 24px; flex-wrap: wrap; }
        .stat-card { background: #f0f6fe; border-radius: 20px; padding: 8px 20px; display: inline-flex; align-items: baseline; gap: 12px; }
        .stat-card span:first-child { font-weight: 600; color: #1a5d8c; }
        .stat-card span:last-child { font-size: 1.6rem; font-weight: 700; color: #004070; }
        .toolbar { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; justify-content: space-between; }
        .btn { padding: 8px 18px; font-weight: bold; border-radius: 40px; cursor: pointer; border: none; font-size: 0.8rem; }
        .btn-add { background: #d4edda; color: #155724; }
        .btn-remove { background: #f8d7da; color: #721c24; }
        .btn-excel { background: #1e6f5c; color: white; }
        .btn-excel:hover { background: #155a4a; }
        .btn-save { background: #17a2b8; color: white; }
        .btn-save:hover { background: #138496; }
        .btn-save:disabled { opacity: 0.5; cursor: not-allowed; }
        .replace-btn { background: #d9eafb; color: #0056a7; padding: 5px 12px; border-radius: 40px; cursor: pointer; border: 1px solid #b9cfec; margin: 0 4px; font-size: 0.75rem; }
        .replace-btn:hover { background: #b9cfec; }
        .grid-2col { display: flex; gap: 28px; flex-wrap: wrap; }
        .card { background: #f8fafd; border-radius: 24px; padding: 16px 20px; border: 1px solid #e2edf7; flex: 1; min-width: 380px; }
        .card h2 { font-size: 1.3rem; margin-top: 0; margin-bottom: 16px; color: #0f3b5c; border-bottom: 2px solid #cbdde9; padding-bottom: 10px; }
        .table-wrapper { max-height: 500px; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        th, td { text-align: left; padding: 10px 8px; border-bottom: 1px solid #dde6ef; }
        th { background-color: #eef3fc; position: sticky; top: 0; }
        .badge-drum { font-family: monospace; background: #eef2fa; padding: 4px 10px; border-radius: 40px; display: inline-block; }
        .stock-list { max-height: 250px; overflow-y: auto; background: white; border-radius: 20px; padding: 6px 12px; border: 1px solid #dce5ef; }
        .stock-item { font-family: monospace; padding: 8px; border-bottom: 1px solid #e9edf2; }
        .history-item { padding: 10px 8px; border-bottom: 1px solid #e9edf2; display: flex; gap: 12px; flex-wrap: wrap; font-size: 0.75rem; }
        .history-item:first-child { background: #fff9e0; border-left: 3px solid #ffc107; }
        .history-date { color: #2c7da0; min-width: 150px; }
        footer { margin-top: 32px; font-size: 0.7rem; text-align: center; color: #6f8eae; }
        .modal-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); display:flex; align-items:center; justify-content:center; z-index:1000; }
        .modal-box { background:white; border-radius:28px; padding:24px; width:340px; }
        .modal-box select { width:100%; padding:8px; margin:12px 0; border-radius:40px; }
        .modal-box button { padding:8px 16px; border:none; border-radius:40px; cursor:pointer; }
        .modal-box .btn-confirm { background:#1e6f5c; color:white; }
        .modal-box .btn-cancel { background:#eee; }
        .modal-box .btn-row { display:flex; gap:12px; justify-content:flex-end; }
    </style>
</head>
<body>
<div class="container">
    <h1>🥁 Барабаны сепараторов</h1>
    <div class="sub">Автоматическая загрузка из data.json</div>
    
    <div class="status-bar" id="statusBar">
        <span>📊 Статус:</span>
        <span id="statusText" class="status-warning">Загрузка...</span>
        <button id="saveToGitBtn" class="btn btn-save" disabled>💾 Сохранить на GitHub</button>
        <button id="saveExcelBtn" class="btn btn-excel">📥 Скачать Excel</button>
    </div>
    
    <div class="stats" id="statsPanel">
        <div class="stat-card"><span>Сепараторов:</span><span id="statSeparators">0</span></div>
        <div class="stat-card"><span>Барабанов:</span><span id="statDrums">0</span></div>
        <div class="stat-card"><span>Установлено:</span><span id="statUsed">0</span></div>
    </div>
    
    <div class="toolbar">
        <div>
            <button id="addDrumBtn" class="btn btn-add">➕ Добавить барабан</button>
            <button id="removeDrumBtn" class="btn btn-remove">➖ Удалить барабан</button>
        </div>
    </div>

    <div class="grid-2col">
        <div class="card">
            <h2>🏭 Сепараторы</h2>
            <div class="table-wrapper">
                <table id="separatorsTable">
                    <thead><tr><th>№</th><th>Верх</th><th>Низ</th><th></th></tr></thead>
                    <tbody id="separatorsRows"></tbody>
                </table>
            </div>
        </div>

        <div class="card">
            <h2>📦 Свободные барабаны</h2>
            <div id="stockContainer" class="stock-list"></div>
            <div style="margin-top: 20px;">
                <h2 style="font-size:1rem;">🕐 История замен</h2>
                <div id="historyList" style="background:white; border-radius:20px; padding:4px 12px; border:1px solid #dce5ef; max-height: 280px; overflow-y: auto;"></div>
            </div>
        </div>
    </div>
    <footer>📌 Данные хранятся в файле data.json на GitHub. Все изменения синхронизируются!</footer>
</div>

<script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
<script>
    // ===== КОНФИГУРАЦИЯ =====
    const REPO_OWNER = 'DmitryErosh';
    const REPO_NAME = 'Seporator';
    const FILE_PATH = 'data.json';
    const GITHUB_API_URL = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${FILE_PATH}`;
    
    let currentData = {
        separators: [],
        allDrums: [],
        history: []
    };
    let currentFileName = "барабаны.xlsx";
    let fileSha = null;
    let isDataLoaded = false;
    
    // ===== ЗАГРУЗКА ДАННЫХ ИЗ GITHUB =====
    async function loadFromGitHub() {
        const statusText = document.getElementById('statusText');
        const saveBtn = document.getElementById('saveToGitBtn');
        
        try {
            statusText.textContent = '⏳ Загрузка с GitHub...';
            statusText.className = 'status-warning';
            saveBtn.disabled = true;
            
            const response = await fetch(GITHUB_API_URL);
            
            if (!response.ok) {
                if (response.status === 404) {
                    throw new Error('Файл data.json не найден! Создайте его в репозитории.');
                }
                throw new Error(`HTTP ${response.status}`);
            }
            
            const data = await response.json();
            fileSha = data.sha;
            
            // Декодируем содержимое (base64 → JSON)
            const content = atob(data.content);
            const jsonData = JSON.parse(content);
            
            currentData.separators = jsonData.separators || [];
            currentData.allDrums = jsonData.allDrums || [];
            currentData.history = jsonData.history || [];
            
            isDataLoaded = true;
            renderAll();
            
            statusText.textContent = `✅ Загружено: ${currentData.separators.length} сеп`;
            statusText.className = 'status-ok';
            saveBtn.disabled = false;
            
        } catch (error) {
            console.error('Ошибка загрузки:', error);
            statusText.textContent = `❌ ${error.message}`;
            statusText.className = 'status-error';
            saveBtn.disabled = true;
            
            // Пробуем загрузить из localStorage
            const hasBackup = loadBackupFromLocal();
            if (hasBackup) {
                statusText.textContent = '⚠️ Загружено из кэша (локально)';
                statusText.className = 'status-warning';
                saveBtn.disabled = false;
            }
        }
    }
    
    // ===== СОХРАНЕНИЕ НА GITHUB =====
    async function saveToGitHub() {
        if (!isDataLoaded && !fileSha) {
            alert('Сначала загрузите данные с GitHub!');
            return;
        }
        
        if (!currentData.separators.length) {
            alert('Нет данных для сохранения!');
            return;
        }
        
        const statusText = document.getElementById('statusText');
        const saveBtn = document.getElementById('saveToGitBtn');
        
        const jsonData = {
            separators: currentData.separators,
            allDrums: currentData.allDrums,
            history: currentData.history,
            lastUpdated: new Date().toISOString()
        };
        
        const content = btoa(unescape(encodeURIComponent(JSON.stringify(jsonData, null, 2))));
        
        const payload = {
            message: `Обновление данных: ${new Date().toLocaleString()}`,
            content: content,
            sha: fileSha
        };
        
        try {
            statusText.textContent = '⏳ Сохранение на GitHub...';
            statusText.className = 'status-warning';
            saveBtn.disabled = true;
            
            const response = await fetch(GITHUB_API_URL, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(payload)
            });
            
            if (!response.ok) {
                const errorData = await response.json();
                throw new Error(errorData.message || `HTTP ${response.status}`);
            }
            
            const result = await response.json();
            fileSha = result.content.sha;
            
            statusText.textContent = '✅ Сохранено на GitHub!';
            statusText.className = 'status-ok';
            saveBtn.disabled = false;
            alert('✅ Данные сохранены на GitHub! Теперь они доступны с любого устройства.');
            
        } catch (error) {
            console.error('Ошибка сохранения:', error);
            alert(`❌ Ошибка сохранения: ${error.message}`);
            statusText.textContent = '❌ Ошибка сохранения';
            statusText.className = 'status-error';
            saveBtn.disabled = false;
        }
    }
    
    // ===== ФУНКЦИИ РАБОТЫ С ДАННЫМИ =====
    function getCurrentDateTime() {
        const now = new Date();
        return `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
    }
    
    function getAvailableDrums() {
        const used = new Set();
        for (let s of currentData.separators) {
            if (s.top) used.add(s.top);
            if (s.bottom) used.add(s.bottom);
        }
        return currentData.allDrums.filter(d => !used.has(d));
    }
    
    function renderAll() {
        const usedCount = currentData.separators.reduce((s, sep) => s + (sep.top ? 1 : 0) + (sep.bottom ? 1 : 0), 0);
        document.getElementById('statSeparators').textContent = currentData.separators.length;
        document.getElementById('statDrums').textContent = currentData.allDrums.length;
        document.getElementById('statUsed').textContent = usedCount;
        
        const tbody = document.getElementById('separatorsRows');
        tbody.innerHTML = '';
        const sortedSeparators = [...currentData.separators].sort((a, b) => parseInt(a.num) - parseInt(b.num));
        for (let sep of sortedSeparators) {
            const row = tbody.insertRow();
            row.insertCell(0).textContent = sep.num;
            row.insertCell(1).innerHTML = sep.top ? `<span class="badge-drum">${sep.top}</span>` : '<span style="color:#aaa;">—</span>';
            row.insertCell(2).innerHTML = sep.bottom ? `<span class="badge-drum">${sep.bottom}</span>` : '<span style="color:#aaa;">—</span>';
            const cell = row.insertCell(3);
            const topBtn = document.createElement('button');
            topBtn.textContent = 'Заменить верх';
            topBtn.className = 'replace-btn';
            topBtn.onclick = () => showDialog(sep.num, 'top', sep.top || '');
            const bottomBtn = document.createElement('button');
            bottomBtn.textContent = 'Заменить низ';
            bottomBtn.className = 'replace-btn';
            bottomBtn.style.marginLeft = '8px';
            bottomBtn.onclick = () => showDialog(sep.num, 'bottom', sep.bottom || '');
            cell.appendChild(topBtn);
            cell.appendChild(bottomBtn);
        }
        
        const available = getAvailableDrums();
        const stockDiv = document.getElementById('stockContainer');
        if (available.length === 0) stockDiv.innerHTML = '<div class="stock-item">✨ Нет свободных барабанов</div>';
        else stockDiv.innerHTML = available.map(d => `<div class="stock-item">🥁 ${d}</div>`).join('');
        
        const historyDiv = document.getElementById('historyList');
        if (currentData.history.length === 0) historyDiv.innerHTML = '<div class="history-item">История пуста</div>';
        else historyDiv.innerHTML = currentData.history.map(h => `<div class="history-item"><span class="history-date">📅 ${h.date}</span><span>🔄 ${h.text}</span></div>`).join('');
        
        saveBackupToLocal();
    }
    
    function showDialog(separatorNum, position, currentDrum) {
        const available = getAvailableDrums();
        if (available.length === 0) { alert('Нет свободных барабанов!'); return; }
        
        const modal = document.createElement('div');
        modal.className = 'modal-overlay';
        modal.innerHTML = `
            <div class="modal-box">
                <h3>Замена барабана</h3>
                <p><strong>Сепаратор ${separatorNum}</strong><br>${position === 'top' ? 'Верхний' : 'Нижний'}: ${currentDrum || 'не установлен'}</p>
                <select id="newDrumSelect">
                    ${available.map(d => `<option value="${d}">${d}</option>`).join('')}
                </select>
                <div class="btn-row">
                    <button id="cancelBtn" class="btn-cancel">Отмена</button>
                    <button id="confirmBtn" class="btn-confirm">Подтвердить</button>
                </div>
            </div>
        `;
        document.body.appendChild(modal);
        const close = () => modal.remove();
        modal.querySelector('#confirmBtn').onclick = () => {
            const newDrum = modal.querySelector('#newDrumSelect').value;
            if (newDrum) {
                const idx = currentData.separators.findIndex(s => s.num === separatorNum);
                if (idx !== -1) {
                    const oldDrum = position === 'top' ? currentData.separators[idx].top : currentData.separators[idx].bottom;
                    if (position === 'top') currentData.separators[idx].top = newDrum;
                    else currentData.separators[idx].bottom = newDrum;
                    currentData.history.unshift({ date: getCurrentDateTime(), text: `Сепаратор ${separatorNum} (${position === 'top' ? 'Верх' : 'Низ'}): ${oldDrum || '—'} → ${newDrum}` });
                    if (currentData.history.length > 30) currentData.history.pop();
                    renderAll();
                    alert('✅ Замена выполнена! Не забудьте нажать "Сохранить на GitHub"');
                }
            }
            close();
        };
        modal.querySelector('#cancelBtn').onclick = close;
    }
    
    function addNewDrum() {
        const name = prompt('Введите название нового барабана (например: 1-12)');
        if (!name || !name.trim()) return;
        if (currentData.allDrums.includes(name.trim())) { alert('Такой барабан уже есть!'); return; }
        currentData.allDrums.push(name.trim());
        currentData.allDrums.sort();
        renderAll();
        alert('✅ Барабан добавлен! Не забудьте нажать "Сохранить на GitHub"');
    }
    
    function removeDrum() {
        const available = getAvailableDrums();
        if (available.length === 0) { alert('Нет свободных барабанов для удаления!'); return; }
        const name = prompt('Введите название барабана для удаления:\n' + available.join(', '));
        if (name && available.includes(name.trim())) {
            const idx = currentData.allDrums.indexOf(name.trim());
            if (idx !== -1) currentData.allDrums.splice(idx, 1);
            renderAll();
            alert('✅ Барабан удалён! Не забудьте нажать "Сохранить на GitHub"');
        } else if (name) alert('Такого барабана нет в списке свободных');
    }
    
    function saveBackupToLocal() {
        const backup = {
            separators: currentData.separators,
            allDrums: currentData.allDrums,
            history: currentData.history,
            lastSaved: getCurrentDateTime()
        };
        localStorage.setItem('barabany_data_backup', JSON.stringify(backup));
    }
    
    function loadBackupFromLocal() {
        const saved = localStorage.getItem('barabany_data_backup');
        if (saved) {
            try {
                const backup = JSON.parse(saved);
                if (backup.separators && backup.separators.length) {
                    currentData.separators = backup.separators;
                    currentData.allDrums = backup.allDrums || [];
                    currentData.history = backup.history || [];
                    renderAll();
                    isDataLoaded = true;
                    return true;
                }
            } catch(e) {}
        }
        return false;
    }
    
    // ===== СОХРАНЕНИЕ В EXCEL =====
    function saveToExcel() {
        if (!currentData.separators.length) {
            alert('Нет данных для сохранения!');
            return;
        }
        
        const separatorsData = [["Сепаратор", "Верх", "Низ"]];
        const sorted = [...currentData.separators].sort((a, b) => parseInt(a.num) - parseInt(b.num));
        for (let s of sorted) {
            separatorsData.push([s.num, s.top, s.bottom]);
        }
        
        const drumsData = [["Барабаны"]];
        const sortedDrums = [...currentData.allDrums].sort();
        for (let d of sortedDrums) {
            drumsData.push([d]);
        }
        
        const historyData = [["Дата", "Событие"]];
        for (let h of currentData.history) {
            historyData.push([h.date, h.text]);
        }
        
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(separatorsData), "Сепараторы");
        XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(drumsData), "Барабаны");
        XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(historyData), "История");
        
        let fileName = prompt("Введите имя файла:", currentFileName);
        if (fileName) {
            if (!fileName.toLowerCase().endsWith('.xlsx')) fileName += '.xlsx';
            XLSX.writeFile(wb, fileName);
            currentFileName = fileName;
            alert(`✅ Сохранено как ${fileName}`);
        }
    }
    
    // ===== ПОДКЛЮЧЕНИЕ КНОПОК =====
    document.getElementById('saveToGitBtn').onclick = saveToGitHub;
    document.getElementById('saveExcelBtn').onclick = saveToExcel;
    document.getElementById('addDrumBtn').onclick = addNewDrum;
    document.getElementById('removeDrumBtn').onclick = removeDrum;
    
    // ===== ЗАПУСК =====
    loadFromGitHub();
</script>
</body>
</html>
